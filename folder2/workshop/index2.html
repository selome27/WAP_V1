<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>

    <form class="m-2 border-2 rounded p-2 border-purple-500 h-100 w-80" submit="onClick">



        <div class="space-y-4">
            <label for="Required Field">Required Field</label><br />

            <input type="text" placeholder="Required Field"
                class="border-2 border-purple-500 placeholder-gray-400 rounded"><br />

            <label for="Required Field">Disabled Field</label><br />

            <input type="text" placeholder="Disabled Field" disabled
                class="border-2 border-purple-500 placeholder-gray-400 bg-purple-100 "><br />

            <label for="Required Field">Input Field</label><br />

            <input type="text" placeholder="Input Field"
                class="border-2 border-purple-500 placeholder-gray-400 rounded"><br />

            <div>
                <input type="checkbox">
                <span>I accept the terms and conditions.</span>
            </div>

        </div>



        <button class="border-2 m-2 rounded-md bg-purple-600 text-black-400 text-sm ">Submit</button>
        <button class="border-2 m-2 rounded-md bg-white-600  text-black-400 text-sm border-purple-500">Reset</button>
        <button
            class="border-2 m-2 rounded-md bg-white-600  text-black-400 text-sm border-purple-500 Disabled: opacity-50">Disabled</button>

    </form>
</body>

</html>
